name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run format:check && npm run lint -w packages/api

      - name: Test
        if: ${{ !inputs.skip_tests }}
        run: npm run test -w packages/api -- --passWithNoTests
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ inputs.environment }}
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run api:build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}/${{ github.repository }}/api
          tags: |
            type=raw,value=${{ inputs.environment }}-${{ github.sha }}
            type=raw,value=${{ inputs.environment }}-latest

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: packages/api
          file: infrastructure/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "Deploying to ${{ inputs.environment }}"
          echo "Image: ${{ needs.build-and-push.outputs.image_tag }}"
          echo "Triggered by: ${{ github.actor }}"

      # -- 실제 배포 단계는 인프라 환경에 맞게 구성 --
      # 예: AWS ECS, Kubernetes, Docker Compose 등
      #
      # - name: Deploy to ECS
      #   uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      #   with:
      #     task-definition: infrastructure/deploy/${{ inputs.environment }}/task-def.json
      #     service: corporate-card-api
      #     cluster: corporate-card-${{ inputs.environment }}

      - name: Health check
        run: |
          echo "Deployment to ${{ inputs.environment }} completed."
          echo "Run post-deploy health checks here."
