version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: corporate-card-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-corporate_card}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-corporate_card}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - corporate-card-network

  redis:
    image: redis:7-alpine
    container_name: corporate-card-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - corporate-card-network

  localstack:
    image: localstack/localstack:3.0
    container_name: corporate-card-s3
    restart: unless-stopped
    ports:
      - '4566:4566'
    environment:
      SERVICES: s3
      DEFAULT_REGION: ap-northeast-2
      EAGER_SERVICE_LOADING: 1
    volumes:
      - localstack_data:/var/lib/localstack
      - ../s3/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh:ro
    networks:
      - corporate-card-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  localstack_data:
    driver: local

networks:
  corporate-card-network:
    driver: bridge
