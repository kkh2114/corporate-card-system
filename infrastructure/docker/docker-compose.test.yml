version: '3.8'

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: corporate-card-postgres-test
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: corporate_card_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d corporate_card_test']
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - test-network

  redis-test:
    image: redis:7-alpine
    container_name: corporate-card-redis-test
    ports:
      - '6380:6379'
    tmpfs:
      - /data
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
