version: '3.8'

# dev 환경 배포용 Docker Compose
# 사용: docker compose -f infrastructure/deploy/dev/docker-compose.deploy.yml up -d

services:
  api:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY:-corporate-card}/api:dev-latest
    container_name: corporate-card-api-dev
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-corporate_card}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      AWS_REGION: ap-northeast-2
      S3_ENDPOINT: http://localstack:4566
      S3_BUCKET_RECEIPTS: corporate-card-receipts
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    container_name: corporate-card-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-corporate_card}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../../infrastructure/docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: corporate-card-redis-dev
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  localstack:
    image: localstack/localstack:3.0
    container_name: corporate-card-s3-dev
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEFAULT_REGION: ap-northeast-2
    volumes:
      - ../../../infrastructure/s3/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh:ro
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
