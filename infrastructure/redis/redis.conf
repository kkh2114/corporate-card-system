# Redis 7 설정 - 법인카드 관리 시스템 개발환경

# 네트워크
bind 0.0.0.0
port 6379
protected-mode no

# 메모리
maxmemory 256mb
maxmemory-policy allkeys-lru

# 영속성 (개발환경: RDB만 사용)
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# 로그
loglevel notice

# 키 만료 이벤트 알림 (세션 만료 감지용)
notify-keyspace-events Ex

# 느린 쿼리 로그
slowlog-log-slower-than 10000
slowlog-max-len 128
