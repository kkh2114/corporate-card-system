global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'corporate-card-api'
    metrics_path: '/api/v1/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          app: 'corporate-card-api'
          environment: 'development'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    # postgres-exporter가 있을 경우 활성화

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    # redis-exporter가 있을 경우 활성화
